<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Circle | Your Semester Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f4f7fe; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .coming-soon { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; position: relative; }
        .premium-lock { opacity: 0.4; pointer-events: none; user-select: none; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; z-index: 1000; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold text-blue-600">Campus<span class="text-gray-800">Circle</span></h1>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        
        <section id="home-section">
            <header class="text-center py-12">
                <h2 class="text-4xl font-extrabold text-gray-900 mb-4">Campus Circle</h2>
                <p class="text-gray-600 italic">Everything you need, organised by semester.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div onclick="showSubjects('3rd')" class="glass p-8 rounded-3xl cursor-pointer hover:shadow-lg transition">
                    <h3 class="text-xl font-bold">3rd Semester</h3>
                    <p class="text-sm text-blue-500">Available Now</p>
                </div>
                <div onclick="showSubjects('4th')" class="glass p-8 rounded-3xl cursor-pointer hover:shadow-lg transition">
                    <h3 class="text-xl font-bold">4th Semester</h3>
                    <p class="text-sm text-blue-500">Available Now</p>
                </div>
                <div class="glass p-8 rounded-3xl coming-soon"><h3 class="text-xl font-bold">5th Semester</h3></div>
                <div class="glass p-8 rounded-3xl coming-soon"><h3 class="text-xl font-bold">6th Semester</h3></div>
            </div>
        </section>

        <section id="subject-section" class="hidden py-10">
            <button onclick="goToHome()" class="mb-6 text-blue-600"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="sem-title" class="text-3xl font-bold mb-8"></h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="loadQuiz()" class="glass p-6 rounded-3xl cursor-pointer border-2 border-transparent hover:border-blue-500">
                    <i class="fas fa-brain text-3xl text-blue-500 mb-4"></i>
                    <h4 class="text-xl font-bold">MCQ Bank</h4>
                </div>
            </div>
        </section>

        <section id="quiz-section" class="hidden py-10">
            <button onclick="showSubjects('3rd')" class="mb-6 text-blue-600"><i class="fas fa-arrow-left"></i> Back</button>
            <div id="quiz-container" class="max-w-2xl mx-auto space-y-6"></div>
        </section>

    </main>

    <div id="payment-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-bold mb-4">মামা, প্রিমিয়াম লাগবে!</h3>
            <p class="mb-6">বিকাশে ৯ টাকা পাঠিয়ে TrxID টা হোয়াটসঅ্যাপে দে।</p>
            <a href="https://wa.me/YOUR_NUMBER" class="block bg-green-500 text-white p-3 rounded-xl font-bold">WhatsApp Now</a>
            <button onclick="closeModal()" class="mt-4 text-gray-400">Close</button>
        </div>
    </div>

    <script>
        // সেকশনগুলো ধরলাম
        const s1 = document.getElementById('home-section');
        const s2 = document.getElementById('subject-section');
        const s3 = document.getElementById('quiz-section');
        const modal = document.getElementById('payment-modal');

        function goToHome() {
            s1.classList.remove('hidden');
            s2.classList.add('hidden');
            s3.classList.add('hidden');
        }

        function showSubjects(sem) {
            s1.classList.add('hidden');
            s2.classList.remove('hidden');
            s3.classList.add('hidden');
            document.getElementById('sem-title').innerText = sem + " Semester";
        }

        async function loadQuiz() {
            s2.classList.add('hidden');
            s3.classList.remove('hidden');
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = "<p>Loading questions, mama...</p>";

            try {
                // তোর গিটহাবের পাথ অনুযায়ী
                const res = await fetch('./data/3rd_sem/demo.json');
                const data = await res.json();
                
                container.innerHTML = ""; // আগের লেখা মুছলাম

                data.forEach((q, i) => {
                    const isLocked = i >= 5;
                    const div = document.createElement('div');
                    div.className = `glass p-6 rounded-3xl ${isLocked ? 'premium-lock' : ''}`;
                    div.innerHTML = `
                        <h4 class="font-bold mb-4">${i+1}. ${q.question}</h4>
                        <div class="space-y-2">
                            ${q.options.map(opt => `<button onclick="checkAns(this, '${q.answer}', '${q.expert_note}')" class="w-full text-left p-3 rounded-xl border border-gray-100 hover:bg-blue-50">${opt}</button>`).join('')}
                        </div>
                        <div class="note hidden mt-4 p-4 bg-blue-50 rounded-xl text-sm italic border-l-4 border-blue-400">
                            <b>Note:</b> ${q.expert_note}
                        </div>
                    `;
                    
                    if(i === 5) {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-4 bg-gray-900 text-white rounded-2xl font-bold mt-4";
                        btn.innerText = "🔒 Unlock 500+ Questions (৳9)";
                        btn.onclick = () => modal.classList.remove('hidden');
                        container.appendChild(btn);
                    }
                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = `<p class='text-red-500'>মামা, demo.json ফাইলটা পাচ্ছিনা। পাথ ঠিক কর!</p>`;
            }
        }

        function checkAns(btn, correct, note) {
            const parent = btn.parentElement.parentElement;
            const noteBox = parent.querySelector('.note');
            if(btn.innerText.trim() === correct.trim()) {
                btn.classList.add('bg-green-100', 'border-green-400');
            } else {
                btn.classList.add('bg-red-100', 'border-red-400');
            }
            noteBox.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }
    </script>
</body>
</html>
